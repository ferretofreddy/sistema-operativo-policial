services:
  frontend-dev:
    name: Frontend Dev Server
    description: Vite dev server for the React frontend
    commands:
      start: cd /workspaces/sistema-operativo-policial/frontend && npm run dev
      ready: curl -s http://localhost:5173 > /dev/null

  keepalive:
    name: Keepalive
    description: Pings the Vite dev server every 30s to prevent environment inactivity shutdown
    commands:
      start: /workspaces/sistema-operativo-policial/scripts/keepalive.sh
      ready: sleep 1
